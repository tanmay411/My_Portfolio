<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--Title-->
  <title>Digital Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-weight: bold;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvUm-2zFwqfzmx8Pf5vOXkKMtvYCf0gHjBXw&s");
      background-size: cover;
    }

    .calculator {
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 3 15px rgba(0, 0, 0, 0.5);
    }

    input {
      width: 320px;
      padding: 24px;
      margin: 10px;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
      font-size: 60px;
      text-align: right;
      color: white;
    }

    input::placeholder {
      color: white;
    }

    button {
      width: 60px;
      height: 60px;
      margin: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      font-size: 24px;
      cursor: pointer;
      border: solid 1px rgba(255, 255, 255, 0.2);
      border-radius: 25px;
      text-shadow: px 1px 5px rgba(0, 0, 0, 0.2);
      box-sizing: -1px 2px 10px rgba(0, 0, 0, 0.5);
    }

    .operator-ac,
    .operator-del {
      font-size: 20px;
    }

    button:hover {
      color: white;
      background: red;
    }

    .equalBtn {
      background: red;
    }

    .operator {
      color: red;
    }
  </style>
</head>

<body>
  <div class="calculator">
    <input type="text" id="inputBox" placeholder="0" readonly />
    <div>
      <button class="operator-ac">AC</button>
      <button class="operator-del">DEL</button>
      <button class="operator">%</button>
      <button class="operator">/</button>
    </div>
    <div>
      <button class="number">7</button>
      <button class="number">8</button>
      <button class="number">9</button>
      <button class="operator">*</button>
    </div>
    <div>
      <button class="number">4</button>
      <button class="number">5</button>
      <button class="number">6</button>
      <button class="operator">-</button>
    </div>
    <div>
      <button class="number">1</button>
      <button class="number">2</button>
      <button class="number">3</button>
      <button class="operator">+</button>
    </div>
    <div>
      <button class="number">00</button>
      <button class="number">0</button>
      <button class="number">.</button>
      <button class="equalBtn">=</button>
    </div>
  </div>
  <script>
    let display = document.getElementById("inputBox");
    let buttons = document.querySelectorAll("button");
    let buttonsArray = Array.from(buttons);
    let string = "";
    buttonsArray.forEach((btn) => {
      btn.addEventListener("click", (e) => {
        if (e.target.innerHTML == "DEL") {
          string = string.substring(0, string.length - 1);
          display.value = string;
        } else if (e.target.innerHTML == "AC") {
          string = "";
          display.value = string;
        } else if (e.target.innerHTML == "=") {
          string = eval(string);
          display.value = string;
        } else {
          string += e.target.innerHTML;
          display.value = string;
        }
      });
    });
  </script>
</body>

</html>
